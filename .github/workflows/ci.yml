name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Compile (desktop)
        shell: bash
        run: |
          START=$(date +%s)
          ./gradlew :desktop:compileTestKotlinDesktop
          END=$(date +%s)
          echo "::notice::Compilation took $((END - START)) seconds"

      - name: Prepare native directories
        shell: powershell
        run: |
          $dirs = @(
            (Join-Path $env:USERPROFILE ".podara\native"),
            (Join-Path $env:USERPROFILE ".skiko")
          )
          foreach ($dir in $dirs) {
            New-Item -ItemType Directory -Path $dir -Force | Out-Null
            Write-Host "Created: $dir"
          }

      - name: Run unit tests
        shell: bash
        run: |
          START=$(date +%s)
          ./gradlew :desktop:desktopTest --tests "app.podara.desktop.ExportManagerTest" --tests "app.podara.desktop.PodcastManagerTest" --tests "app.podara.desktop.DownloadManagerTest" --tests "app.podara.desktop.ImportManagerTest" --tests "app.podara.desktop.MediaPlayerStateTest" --tests "app.podara.desktop.HistoryDaoTest" --tests "app.podara.desktop.FavoriteDaoTest" --tests "app.podara.desktop.AudioPlayerTest" --tests "app.podara.desktop.MpvAudioPlayerEngineTest" --tests "app.podara.desktop.UnsubscribeTest" --tests "app.podara.desktop.PodcastDetailUtilTest"
          END=$(date +%s)
          echo "::notice::Tests took $((END - START)) seconds"

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: unit-test-results
          path: desktop/build/reports/tests/

  gui-tests:
    name: GUI Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Compile (desktop + tests)
        shell: bash
        run: |
          START=$(date +%s)
          ./gradlew :desktop:compileTestKotlinDesktop
          END=$(date +%s)
          echo "::notice::Compilation took $((END - START)) seconds"

      - name: Prepare native directories
        shell: powershell
        run: |
          $dirs = @(
            (Join-Path $env:USERPROFILE ".podara\native"),
            (Join-Path $env:USERPROFILE ".skiko")
          )
          foreach ($dir in $dirs) {
            New-Item -ItemType Directory -Path $dir -Force | Out-Null
            Write-Host "Created: $dir"
          }

      - name: Run GUI tests
        shell: bash
        run: |
          START=$(date +%s)
          ./gradlew :desktop:desktopTest --tests "app.podara.desktop.AppGUITest" --tests "app.podara.desktop.DiscoverScreenTest" --tests "app.podara.desktop.HistoryScreenTest" --tests "app.podara.desktop.FavoritesScreenTest" --tests "app.podara.desktop.SettingsScreenTest"
          END=$(date +%s)
          echo "::notice::Tests took $((END - START)) seconds"

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: gui-test-results
          path: desktop/build/reports/tests/

  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build desktop module
        run: ./gradlew :desktop:compileKotlinDesktop
