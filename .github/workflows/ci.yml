name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests-1:
    name: Unit Tests (Player)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install VLC
        run: winget install VideoLAN.VLC --accept-source-agreements --accept-package-agreements

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Run player tests
        run: ./gradlew --parallel :desktop:desktopTest --tests "app.podiumpodcasts.podium.desktop.VlcjMediaPlayerTest" --tests "app.podiumpodcasts.podium.desktop.MediaPlayerStateTest"

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: unit-test-results-player
          path: desktop/build/reports/tests/

  unit-tests-2:
    name: Unit Tests (Data)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install VLC
        run: winget install VideoLAN.VLC --accept-source-agreements --accept-package-agreements

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Run data tests
        run: ./gradlew --parallel :desktop:desktopTest --tests "app.podiumpodcasts.podium.desktop.ExportManagerTest" --tests "app.podiumpodcasts.podium.desktop.PodcastManagerTest" --tests "app.podiumpodcasts.podium.desktop.HistoryDaoTest"

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: unit-test-results-data
          path: desktop/build/reports/tests/

  unit-tests-3:
    name: Unit Tests (IO)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install VLC
        run: winget install VideoLAN.VLC --accept-source-agreements --accept-package-agreements

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Run IO tests
        run: ./gradlew --parallel :desktop:desktopTest --tests "app.podiumpodcasts.podium.desktop.DownloadManagerTest" --tests "app.podiumpodcasts.podium.desktop.ImportManagerTest"

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: unit-test-results-io
          path: desktop/build/reports/tests/

  gui-tests:
    name: GUI Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install VLC
        run: winget install VideoLAN.VLC --accept-source-agreements --accept-package-agreements

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Run GUI tests
        run: ./gradlew --parallel :desktop:desktopTest --tests "app.podiumpodcasts.podium.desktop.AppGUITest" --tests "app.podiumpodcasts.podium.desktop.DiscoverScreenTest" --tests "app.podiumpodcasts.podium.desktop.HistoryScreenTest" --tests "app.podiumpodcasts.podium.desktop.SettingsScreenTest"

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: gui-test-results
          path: desktop/build/reports/tests/

  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build desktop module
        run: ./gradlew --parallel :desktop:compileKotlinDesktop
